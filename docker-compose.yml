version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ml_inference
      DB_USER: ml_user
      DB_PASSWORD: ml_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - ml_net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ml_inference
      MYSQL_USER: ml_user
      MYSQL_PASSWORD: ml_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ml_user", "-pml_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ml_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ml_net

volumes:
  mysql_data:

networks:
  ml_net:
    driver: bridge
